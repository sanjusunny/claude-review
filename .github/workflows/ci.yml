name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python sweep on Linux; a representative version on macOS and
        # Windows to keep the cross-OS slug/encoding logic and the native-Windows
        # degrade path honest. (The interactive TUI needs a tty and can't run in
        # CI on any OS — that stays manual.)
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with test extras)
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
      - name: Smoke check the console script
        run: |
          claude-review --version
          claude-review --help
      - name: Run tests
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check the personal email never ships in metadata
        run: |
          ! unzip -p dist/*.whl '*/METADATA' | grep -i 'gmail' || (echo "personal email leaked into wheel metadata" && exit 1)
